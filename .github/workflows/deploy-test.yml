name: deploy-test

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    env:
      CI: true
      NUXT_AUTH0_APP_BASE_URL: http://localhost:3000
      NUXT_DATABASE_BINDING: DB

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Integration tests
        run: bun run test:integration

  deploy-test:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: backend-checks
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-test
      cancel-in-progress: true
    environment:
      name: test
      url: ${{ vars.BASE_DOMAIN != '' && format('https://{0}', vars.BASE_DOMAIN) || '' }}
    env:
      CI: true
      NODE_OPTIONS: --max-old-space-size=4096
      # Deployment defaults.
      ENV_NAME: ${{ vars.ENV_NAME }}
      RESOURCE_PREFIX: ${{ vars.RESOURCE_PREFIX }}
      BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}
      # Cloudflare resource metadata overrides.
      CF_ZONE_NAME: ${{ vars.CF_ZONE_NAME }}
      CF_WORKER_NAME: ${{ vars.CF_WORKER_NAME }}
      CF_D1_DATABASE_NAME: ${{ vars.CF_D1_DATABASE_NAME }}
      CF_PROFILE_ICONS_BUCKET: ${{ vars.CF_PROFILE_ICONS_BUCKET }}
      CF_EVENT_IMAGES_BUCKET: ${{ vars.CF_EVENT_IMAGES_BUCKET }}
      CF_APPLICATION_REVIEW_EMAIL_QUEUE: ${{ vars.CF_APPLICATION_REVIEW_EMAIL_QUEUE }}
      CF_EVENT_OUTCOME_EMAIL_QUEUE: ${{ vars.CF_EVENT_OUTCOME_EMAIL_QUEUE }}
      CF_LUMA_SYNC_QUEUE: ${{ vars.CF_LUMA_SYNC_QUEUE }}
      # Auth0 bootstrap settings.
      AUTH0_MANAGEMENT_DOMAIN: ${{ vars.AUTH0_MANAGEMENT_DOMAIN }}
      AUTH0_APP_BASE_URL: https://${{ vars.BASE_DOMAIN }}
      AUTH0_CUSTOM_DOMAIN: ${{ vars.AUTH0_CUSTOM_DOMAIN || format('auth.{0}', vars.BASE_DOMAIN) }}
      AUTH0_LOGIN_URI: https://${{ vars.BASE_DOMAIN }}/auth/login
      AUTH0_APP_DISPLAY_NAME: ${{ vars.AUTH0_APP_DISPLAY_NAME }}
      AUTH0_DATABASE_CONNECTION_NAME: ${{ vars.NUXT_AUTH0_DATABASE_CONNECTION_NAME || 'Username-Password-Authentication' }}
      AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
      # Auth0 runtime settings.
      NUXT_AUTH0_APP_BASE_URL: https://${{ vars.BASE_DOMAIN }}
      NUXT_AUTH0_DATABASE_CONNECTION_NAME: ${{ vars.NUXT_AUTH0_DATABASE_CONNECTION_NAME || 'Username-Password-Authentication' }}
      NUXT_FIRST_PLATFORM_ADMIN_EMAIL: ${{ vars.NUXT_FIRST_PLATFORM_ADMIN_EMAIL }}
      # Cloudflare Email Service and Queues runtime settings.
      NUXT_OUTBOUND_EMAIL_BINDING: ${{ vars.NUXT_OUTBOUND_EMAIL_BINDING }}
      NUXT_OUTBOUND_EMAIL_FROM_EMAIL: ${{ vars.NUXT_OUTBOUND_EMAIL_FROM_EMAIL }}
      NUXT_OUTBOUND_EMAIL_FROM_NAME: ${{ vars.NUXT_OUTBOUND_EMAIL_FROM_NAME }}
      NUXT_OUTBOUND_EMAIL_REPLY_TO: ${{ vars.NUXT_OUTBOUND_EMAIL_REPLY_TO }}
      NUXT_APPLICATION_REVIEW_EMAILS_QUEUE_BINDING: ${{ vars.NUXT_APPLICATION_REVIEW_EMAILS_QUEUE_BINDING }}
      NUXT_APPLICATION_REVIEW_EMAILS_RETRY_DELAY_SECONDS: ${{ vars.NUXT_APPLICATION_REVIEW_EMAILS_RETRY_DELAY_SECONDS }}
      NUXT_EVENT_OUTCOME_EMAILS_QUEUE_BINDING: ${{ vars.NUXT_EVENT_OUTCOME_EMAILS_QUEUE_BINDING }}
      NUXT_EVENT_OUTCOME_EMAILS_RETRY_DELAY_SECONDS: ${{ vars.NUXT_EVENT_OUTCOME_EMAILS_RETRY_DELAY_SECONDS }}
      NUXT_LUMA_QUEUE_BINDING: ${{ vars.NUXT_LUMA_QUEUE_BINDING }}
      NUXT_LUMA_RETRY_DELAY_SECONDS: ${{ vars.NUXT_LUMA_RETRY_DELAY_SECONDS }}
      # Worker secrets.
      NUXT_AUTH0_CLIENT_ID: ${{ secrets.NUXT_AUTH0_CLIENT_ID }}
      NUXT_AUTH0_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_CLIENT_SECRET }}
      NUXT_AUTH0_SESSION_SECRET: ${{ secrets.NUXT_AUTH0_SESSION_SECRET }}
      NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: ${{ secrets.NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET }}
      # Cloudflare credentials.
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      # Wrangler-supported aliases for Cloudflare credentials.
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

    steps:
      - name: Check test deployment configuration
        id: test_deploy_config
        run: |
          set -euo pipefail
          if [ -z "${BASE_DOMAIN:-}" ]; then
            printf 'enabled=false\n' >> "$GITHUB_OUTPUT"
            echo "::notice::Test deployment skipped because BASE_DOMAIN is not configured for the test environment."
            exit 0
          fi

          printf 'enabled=true\n' >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        uses: actions/checkout@v6.0.2

      - name: Install bun
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: bun ci

      - name: Ensure test Auth0 custom domain and verification DNS
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        env:
          AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
          AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
        run: bun run auth0:custom-domain

      - name: Ensure test D1 database
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: bun tools/deploy/ensure-d1-database.ts test

      - name: Ensure test R2 buckets
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: bun tools/deploy/ensure-r2-buckets.ts test

      - name: Ensure test Cloudflare Queues
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          bun run deploy:config:test
          while IFS= read -r queue_name; do
            [ -n "$queue_name" ] || continue
            if bunx wrangler queues info "$queue_name" --config .wrangler/generated/test.jsonc >/dev/null 2>&1; then
              echo "Queue ${queue_name} already exists."
            else
              bunx wrangler queues create "$queue_name" --config .wrangler/generated/test.jsonc
            fi
          done < <(jq -r '.queues.producers[].queue' .wrangler/generated/test.jsonc)

      - name: Upload test Worker secrets
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: |
          bun tools/deploy/write-worker-secrets.ts .wrangler-test-secrets.json
          bunx wrangler secret bulk .wrangler-test-secrets.json --config .wrangler/generated/test.jsonc
          rm -f .wrangler-test-secrets.json

      - name: Apply test Auth0 configuration
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: bun tools/auth0/auth0-bootstrap.ts apply

      - name: Apply test D1 migrations
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: bun run db:migrate:test

      - name: Deploy test Worker
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: bun run deploy:worker:test

      - name: Reconcile test Queue consumers
        if: ${{ steps.test_deploy_config.outputs.enabled == 'true' }}
        run: bun run deploy:queue-consumers:test

  auth0-bdd-suite:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    needs: backend-checks
    runs-on: ubuntu-latest
    environment:
      name: bdd
    env:
      CI: true
      NUXT_AUTH0_DOMAIN: ${{ secrets.NUXT_AUTH0_DOMAIN }}
      NUXT_AUTH0_CLIENT_ID: ${{ secrets.NUXT_AUTH0_CLIENT_ID }}
      NUXT_AUTH0_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_CLIENT_SECRET }}
      NUXT_AUTH0_SESSION_SECRET: ${{ secrets.NUXT_AUTH0_SESSION_SECRET }}
      NUXT_AUTH0_APP_BASE_URL: http://localhost:3000
      NUXT_AUTH0_DATABASE_CONNECTION_NAME: ${{ vars.NUXT_AUTH0_DATABASE_CONNECTION_NAME }}
      NUXT_DATABASE_BINDING: DB
      AUTH0_MANAGEMENT_DOMAIN: ${{ vars.AUTH0_MANAGEMENT_DOMAIN }}
      AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
      E2E_PLATFORM_ADMIN_EMAIL: ${{ secrets.E2E_PLATFORM_ADMIN_EMAIL }}
      E2E_PLATFORM_ADMIN_PASSWORD: ${{ secrets.E2E_PLATFORM_ADMIN_PASSWORD }}
      E2E_EVENT_ADMIN_EMAIL: ${{ secrets.E2E_EVENT_ADMIN_EMAIL }}
      E2E_EVENT_ADMIN_PASSWORD: ${{ secrets.E2E_EVENT_ADMIN_PASSWORD }}
      E2E_JUDGE_EMAIL: ${{ secrets.E2E_JUDGE_EMAIL }}
      E2E_JUDGE_PASSWORD: ${{ secrets.E2E_JUDGE_PASSWORD }}
      E2E_REGULAR_USER_EMAIL: ${{ secrets.E2E_REGULAR_USER_EMAIL }}
      E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}

    steps:
      - name: Check Auth0-backed BDD configuration
        id: auth0_bdd_config
        run: |
          set -euo pipefail
          missing=()
          for name in \
            NUXT_AUTH0_DOMAIN \
            NUXT_AUTH0_CLIENT_ID \
            NUXT_AUTH0_CLIENT_SECRET \
            NUXT_AUTH0_DATABASE_CONNECTION_NAME \
            AUTH0_MANAGEMENT_DOMAIN \
            AUTH0_MGMT_CLIENT_ID \
            AUTH0_MGMT_CLIENT_SECRET \
            E2E_PLATFORM_ADMIN_EMAIL \
            E2E_PLATFORM_ADMIN_PASSWORD \
            E2E_EVENT_ADMIN_EMAIL \
            E2E_EVENT_ADMIN_PASSWORD \
            E2E_JUDGE_EMAIL \
            E2E_JUDGE_PASSWORD \
            E2E_REGULAR_USER_EMAIL \
            E2E_REGULAR_USER_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'enabled=false\n' >> "$GITHUB_OUTPUT"
            printf '::notice::Auth0-backed BDD suite skipped because required environment values are missing: %s.\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 0
          fi

          printf 'enabled=true\n' >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        uses: actions/checkout@v6.0.2

      - name: Install bun
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Resolve Auth0-backed BDD generated secrets
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        run: |
          session_secret="$(bun -e "import { resolveAuth0SessionSecret } from './tools/auth0/generated-secrets.ts'; console.log(resolveAuth0SessionSecret(process.env));")"
          echo "::add-mask::$session_secret"
          printf 'NUXT_AUTH0_SESSION_SECRET=%s\n' "$session_secret" >> "$GITHUB_ENV"

      - name: Cache Bun install cache
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        run: bun ci

      - name: Cache Playwright Chromium
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        uses: actions/cache@v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        run: bunx playwright install --with-deps chromium

      - name: Auth0-backed BDD suite
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        run: bun run test:bdd
