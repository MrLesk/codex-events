name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    env:
      CI: true
      NUXT_AUTH0_APP_BASE_URL: http://localhost:3000
      NUXT_DATABASE_BINDING: DB

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Integration tests
        run: bun run test:integration

  auth0-prod-consent-drift-check:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: backend-checks
    runs-on: ubuntu-latest
    env:
      CI: true
      AUTH0_DOMAIN: ${{ secrets.AUTH0_PROD_DOMAIN }}
      AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_PROD_MGMT_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_PROD_MGMT_CLIENT_SECRET }}
      AUTH0_MGMT_AUDIENCE: ${{ secrets.AUTH0_PROD_MGMT_AUDIENCE }}
      AUTH0_APP_CLIENT_ID: ${{ secrets.AUTH0_PROD_APP_CLIENT_ID }}
      AUTH0_CUSTOM_DOMAIN: ${{ secrets.AUTH0_PROD_CUSTOM_DOMAIN }}
      AUTH0_APP_BASE_URL: ${{ secrets.AUTH0_PROD_APP_BASE_URL }}
      AUTH0_TERMS_URL: ${{ secrets.AUTH0_PROD_TERMS_URL }}
      AUTH0_PRIVACY_URL: ${{ secrets.AUTH0_PROD_PRIVACY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Verify required Auth0 production secrets
        run: |
          required=(
            AUTH0_DOMAIN
            AUTH0_MGMT_CLIENT_ID
            AUTH0_MGMT_CLIENT_SECRET
            AUTH0_MGMT_AUDIENCE
            AUTH0_APP_CLIENT_ID
            AUTH0_CUSTOM_DOMAIN
            AUTH0_APP_BASE_URL
            AUTH0_TERMS_URL
            AUTH0_PRIVACY_URL
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret mapped to ${key}"
              exit 1
            fi
          done

      - name: Check Auth0 production consent configuration drift
        run: bun run auth0:consent:check

  auth0-bdd-suite:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    needs: backend-checks
    runs-on: ubuntu-latest
    env:
      CI: true
      NUXT_AUTH0_DOMAIN: ${{ secrets.NUXT_AUTH0_DOMAIN }}
      NUXT_AUTH0_CLIENT_ID: ${{ secrets.NUXT_AUTH0_CLIENT_ID }}
      NUXT_AUTH0_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_CLIENT_SECRET }}
      NUXT_AUTH0_SESSION_SECRET: ${{ secrets.NUXT_AUTH0_SESSION_SECRET }}
      NUXT_AUTH0_APP_BASE_URL: http://localhost:3000
      NUXT_AUTH0_AUDIENCE: ${{ secrets.NUXT_AUTH0_AUDIENCE }}
      NUXT_DATABASE_BINDING: DB
      AUTH0_TEST_DOMAIN: ${{ secrets.AUTH0_TEST_DOMAIN }}
      AUTH0_TEST_MGMT_CLIENT_ID: ${{ secrets.AUTH0_TEST_MGMT_CLIENT_ID }}
      AUTH0_TEST_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_TEST_MGMT_CLIENT_SECRET }}
      AUTH0_TEST_MGMT_AUDIENCE: ${{ secrets.AUTH0_TEST_MGMT_AUDIENCE }}
      AUTH0_TEST_CONNECTION_NAME: ${{ secrets.AUTH0_TEST_CONNECTION_NAME }}
      E2E_PLATFORM_ADMIN_EMAIL: ${{ secrets.E2E_PLATFORM_ADMIN_EMAIL }}
      E2E_PLATFORM_ADMIN_PASSWORD: ${{ secrets.E2E_PLATFORM_ADMIN_PASSWORD }}
      E2E_HACKATHON_ADMIN_EMAIL: ${{ secrets.E2E_HACKATHON_ADMIN_EMAIL }}
      E2E_HACKATHON_ADMIN_PASSWORD: ${{ secrets.E2E_HACKATHON_ADMIN_PASSWORD }}
      E2E_JUDGE_EMAIL: ${{ secrets.E2E_JUDGE_EMAIL }}
      E2E_JUDGE_PASSWORD: ${{ secrets.E2E_JUDGE_PASSWORD }}
      E2E_REGULAR_USER_EMAIL: ${{ secrets.E2E_REGULAR_USER_EMAIL }}
      E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Auth0-backed BDD suite
        run: bun run test:bdd
