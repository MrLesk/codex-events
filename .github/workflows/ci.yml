name: ci

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    env:
      CI: true
      NUXT_AUTH0_APP_BASE_URL: http://localhost:3000
      NUXT_DATABASE_BINDING: DB

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Integration tests
        run: bun run test:integration

  deploy-dev:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: backend-checks
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    environment:
      name: dev
      url: https://dev.codex-events.com
    env:
      CI: true
      NODE_OPTIONS: --max-old-space-size=4096
      NUXT_AUTH0_CLIENT_ID: ${{ secrets.NUXT_AUTH0_CLIENT_ID }}
      NUXT_AUTH0_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_CLIENT_SECRET }}
      NUXT_AUTH0_SESSION_SECRET: ${{ secrets.NUXT_AUTH0_SESSION_SECRET }}
      NUXT_AUTH0_AUDIENCE: ${{ secrets.NUXT_AUTH0_AUDIENCE }}
      NUXT_AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.NUXT_AUTH0_MANAGEMENT_CLIENT_ID }}
      NUXT_AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_MANAGEMENT_CLIENT_SECRET }}
      NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: ${{ secrets.NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET }}
      NUXT_LUMA_API_KEY: ${{ secrets.NUXT_LUMA_API_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Ensure shared dev Cloudflare Queues
        run: |
          set -euo pipefail
          while IFS= read -r queue_name; do
            [ -n "$queue_name" ] || continue
            if bunx wrangler queues info "$queue_name" --env dev --config wrangler.jsonc >/dev/null 2>&1; then
              echo "Queue ${queue_name} already exists."
            else
              bunx wrangler queues create "$queue_name" --env dev --config wrangler.jsonc
            fi
          done < <(jq -r '.env.dev.queues.producers[].queue' wrangler.jsonc)

      - name: Reconcile shared dev Luma webhook
        if: ${{ env.NUXT_LUMA_API_KEY != '' }}
        env:
          LUMA_WEBHOOK_URL: https://dev.codex-events.com/api/public/luma/webhooks
        run: |
          set -euo pipefail
          if output="$(bun tools/luma/webhook-bootstrap.ts apply --secret-bulk-path .wrangler-dev-luma-webhook-secret.json 2>&1)"; then
            printf '%s\n' "$output"
            exit 0
          fi

          printf '%s\n' "$output"
          if grep -Fq 'active Luma Plus plan' <<< "$output"; then
            echo "::warning::Skipping dev Luma webhook reconciliation because this Luma calendar cannot use API requests without an active Luma Plus plan."
            exit 0
          fi

          exit 1

      - name: Upload shared dev Worker secrets
        run: |
          jq -n \
            --arg auth0ClientId "$NUXT_AUTH0_CLIENT_ID" \
            --arg auth0ClientSecret "$NUXT_AUTH0_CLIENT_SECRET" \
            --arg auth0SessionSecret "$NUXT_AUTH0_SESSION_SECRET" \
            --arg auth0Audience "$NUXT_AUTH0_AUDIENCE" \
            --arg auth0ManagementClientId "$NUXT_AUTH0_MANAGEMENT_CLIENT_ID" \
            --arg auth0ManagementClientSecret "$NUXT_AUTH0_MANAGEMENT_CLIENT_SECRET" \
            --arg accountLinkChallengeSecret "$NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET" \
            --arg lumaApiKey "$NUXT_LUMA_API_KEY" \
            '{
              NUXT_AUTH0_CLIENT_ID: $auth0ClientId,
              NUXT_AUTH0_CLIENT_SECRET: $auth0ClientSecret,
              NUXT_AUTH0_SESSION_SECRET: $auth0SessionSecret,
              NUXT_AUTH0_AUDIENCE: $auth0Audience,
              NUXT_AUTH0_MANAGEMENT_CLIENT_ID: $auth0ManagementClientId,
              NUXT_AUTH0_MANAGEMENT_CLIENT_SECRET: $auth0ManagementClientSecret,
              NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: $accountLinkChallengeSecret,
              NUXT_LUMA_API_KEY: $lumaApiKey
            }' > .wrangler-dev-secrets.json
          if [ -f .wrangler-dev-luma-webhook-secret.json ]; then
            jq -s '.[0] * .[1]' \
              .wrangler-dev-secrets.json \
              .wrangler-dev-luma-webhook-secret.json > .wrangler-dev-secrets.merged.json
            mv .wrangler-dev-secrets.merged.json .wrangler-dev-secrets.json
          fi
          bunx wrangler secret bulk .wrangler-dev-secrets.json --env dev --config wrangler.jsonc
          rm -f .wrangler-dev-secrets.json .wrangler-dev-luma-webhook-secret.json

      - name: Apply shared dev D1 migrations
        run: bun run db:migrate:dev

      - name: Deploy shared dev environment
        run: bun run deploy:dev

  auth0-bdd-suite:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    needs: backend-checks
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.codex-events.com
    env:
      CI: true
      NUXT_AUTH0_DOMAIN: ${{ secrets.NUXT_AUTH0_DOMAIN }}
      NUXT_AUTH0_CLIENT_ID: ${{ secrets.NUXT_AUTH0_CLIENT_ID }}
      NUXT_AUTH0_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_CLIENT_SECRET }}
      NUXT_AUTH0_SESSION_SECRET: ${{ secrets.NUXT_AUTH0_SESSION_SECRET }}
      NUXT_AUTH0_APP_BASE_URL: http://localhost:3000
      NUXT_AUTH0_AUDIENCE: ${{ secrets.NUXT_AUTH0_AUDIENCE }}
      NUXT_DATABASE_BINDING: DB
      AUTH0_TEST_DOMAIN: ${{ secrets.AUTH0_TEST_DOMAIN }}
      AUTH0_TEST_MGMT_CLIENT_ID: ${{ secrets.AUTH0_TEST_MGMT_CLIENT_ID }}
      AUTH0_TEST_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_TEST_MGMT_CLIENT_SECRET }}
      AUTH0_TEST_MGMT_AUDIENCE: ${{ secrets.AUTH0_TEST_MGMT_AUDIENCE }}
      AUTH0_TEST_CONNECTION_NAME: ${{ secrets.AUTH0_TEST_CONNECTION_NAME }}
      E2E_PLATFORM_ADMIN_EMAIL: ${{ secrets.E2E_PLATFORM_ADMIN_EMAIL }}
      E2E_PLATFORM_ADMIN_PASSWORD: ${{ secrets.E2E_PLATFORM_ADMIN_PASSWORD }}
      E2E_EVENT_ADMIN_EMAIL: ${{ secrets.E2E_EVENT_ADMIN_EMAIL }}
      E2E_EVENT_ADMIN_PASSWORD: ${{ secrets.E2E_EVENT_ADMIN_PASSWORD }}
      E2E_JUDGE_EMAIL: ${{ secrets.E2E_JUDGE_EMAIL }}
      E2E_JUDGE_PASSWORD: ${{ secrets.E2E_JUDGE_PASSWORD }}
      E2E_REGULAR_USER_EMAIL: ${{ secrets.E2E_REGULAR_USER_EMAIL }}
      E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Cache Playwright Chromium
        uses: actions/cache@v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Auth0-backed BDD suite
        run: bun run test:bdd
