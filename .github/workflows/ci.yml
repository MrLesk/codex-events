name: ci

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    env:
      CI: true
      NUXT_AUTH0_APP_BASE_URL: http://localhost:3000
      NUXT_DATABASE_BINDING: DB

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Integration tests
        run: bun run test:integration

  deploy-dev:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: backend-checks
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    environment:
      name: dev
      url: ${{ vars.DEPLOY_BASE_DOMAIN != '' && format('https://{0}', vars.DEPLOY_BASE_DOMAIN) || '' }}
    env:
      CI: true
      NODE_OPTIONS: --max-old-space-size=4096
      # Deployment defaults.
      DEPLOY_ENV_NAME: ${{ vars.DEPLOY_ENV_NAME }}
      DEPLOY_RESOURCE_PREFIX: ${{ vars.DEPLOY_RESOURCE_PREFIX }}
      DEPLOY_BASE_DOMAIN: ${{ vars.DEPLOY_BASE_DOMAIN }}
      # Cloudflare resource metadata overrides.
      DEPLOY_CF_ZONE_NAME: ${{ vars.DEPLOY_CF_ZONE_NAME }}
      DEPLOY_CF_WORKER_NAME: ${{ vars.DEPLOY_CF_WORKER_NAME }}
      DEPLOY_CF_D1_DATABASE_NAME: ${{ vars.DEPLOY_CF_D1_DATABASE_NAME }}
      DEPLOY_CF_PROFILE_ICONS_BUCKET: ${{ vars.DEPLOY_CF_PROFILE_ICONS_BUCKET }}
      DEPLOY_CF_EVENT_IMAGES_BUCKET: ${{ vars.DEPLOY_CF_EVENT_IMAGES_BUCKET }}
      DEPLOY_CF_APPLICATION_REVIEW_EMAIL_QUEUE: ${{ vars.DEPLOY_CF_APPLICATION_REVIEW_EMAIL_QUEUE }}
      DEPLOY_CF_EVENT_OUTCOME_EMAIL_QUEUE: ${{ vars.DEPLOY_CF_EVENT_OUTCOME_EMAIL_QUEUE }}
      DEPLOY_CF_LUMA_SYNC_QUEUE: ${{ vars.DEPLOY_CF_LUMA_SYNC_QUEUE }}
      # Deployment URL overrides.
      DEPLOY_AUTH0_CUSTOM_DOMAIN: ${{ vars.DEPLOY_AUTH0_CUSTOM_DOMAIN }}
      DEPLOY_LUMA_WEBHOOK_URL: ${{ vars.DEPLOY_LUMA_WEBHOOK_URL }}
      LUMA_WEBHOOK_URL: ${{ vars.DEPLOY_LUMA_WEBHOOK_URL }}
      # Auth0 bootstrap settings.
      AUTH0_MANAGEMENT_DOMAIN: ${{ vars.AUTH0_MANAGEMENT_DOMAIN }}
      AUTH0_APP_BASE_URL: https://${{ vars.DEPLOY_BASE_DOMAIN }}
      AUTH0_CUSTOM_DOMAIN: ${{ vars.DEPLOY_AUTH0_CUSTOM_DOMAIN }}
      AUTH0_LOGIN_URI: https://${{ vars.DEPLOY_BASE_DOMAIN }}/auth/login
      AUTH0_APP_DISPLAY_NAME: ${{ vars.AUTH0_APP_DISPLAY_NAME }}
      AUTH0_DATABASE_CONNECTION_NAME: ${{ vars.NUXT_AUTH0_DATABASE_CONNECTION_NAME || 'Username-Password-Authentication' }}
      AUTH0_APP_CLIENT_ID: ${{ secrets.NUXT_AUTH0_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
      AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: ${{ secrets.NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET }}
      # Auth0 runtime settings.
      NUXT_AUTH0_APP_BASE_URL: https://${{ vars.DEPLOY_BASE_DOMAIN }}
      NUXT_AUTH0_DATABASE_CONNECTION_NAME: ${{ vars.NUXT_AUTH0_DATABASE_CONNECTION_NAME || 'Username-Password-Authentication' }}
      # Cloudflare Email Service and Queues runtime settings.
      NUXT_OUTBOUND_EMAIL_BINDING: ${{ vars.NUXT_OUTBOUND_EMAIL_BINDING }}
      NUXT_OUTBOUND_EMAIL_FROM_EMAIL: ${{ vars.NUXT_OUTBOUND_EMAIL_FROM_EMAIL }}
      NUXT_OUTBOUND_EMAIL_FROM_NAME: ${{ vars.NUXT_OUTBOUND_EMAIL_FROM_NAME }}
      NUXT_OUTBOUND_EMAIL_REPLY_TO: ${{ vars.NUXT_OUTBOUND_EMAIL_REPLY_TO }}
      NUXT_APPLICATION_REVIEW_EMAILS_QUEUE_BINDING: ${{ vars.NUXT_APPLICATION_REVIEW_EMAILS_QUEUE_BINDING }}
      NUXT_APPLICATION_REVIEW_EMAILS_RETRY_DELAY_SECONDS: ${{ vars.NUXT_APPLICATION_REVIEW_EMAILS_RETRY_DELAY_SECONDS }}
      NUXT_EVENT_OUTCOME_EMAILS_QUEUE_BINDING: ${{ vars.NUXT_EVENT_OUTCOME_EMAILS_QUEUE_BINDING }}
      NUXT_EVENT_OUTCOME_EMAILS_RETRY_DELAY_SECONDS: ${{ vars.NUXT_EVENT_OUTCOME_EMAILS_RETRY_DELAY_SECONDS }}
      NUXT_LUMA_QUEUE_BINDING: ${{ vars.NUXT_LUMA_QUEUE_BINDING }}
      NUXT_LUMA_RETRY_DELAY_SECONDS: ${{ vars.NUXT_LUMA_RETRY_DELAY_SECONDS }}
      # Worker secrets.
      NUXT_AUTH0_CLIENT_ID: ${{ secrets.NUXT_AUTH0_CLIENT_ID }}
      NUXT_AUTH0_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_CLIENT_SECRET }}
      NUXT_AUTH0_SESSION_SECRET: ${{ secrets.NUXT_AUTH0_SESSION_SECRET }}
      NUXT_AUTH0_AUDIENCE: ${{ secrets.NUXT_AUTH0_AUDIENCE }}
      NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: ${{ secrets.NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET }}
      NUXT_LUMA_API_KEY: ${{ secrets.NUXT_LUMA_API_KEY }}
      # Cloudflare credentials.
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Check shared dev deployment configuration
        id: dev_deploy_config
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_BASE_DOMAIN:-}" ]; then
            printf 'enabled=false\n' >> "$GITHUB_OUTPUT"
            echo "::notice::Shared dev deployment skipped because DEPLOY_BASE_DOMAIN is not configured for the dev environment."
            exit 0
          fi

          printf 'enabled=true\n' >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        uses: actions/checkout@v6.0.2

      - name: Install bun
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: bun ci

      - name: Ensure shared dev Auth0 custom domain and verification DNS
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        env:
          AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
          AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
        run: bun run auth0:custom-domain

      - name: Ensure shared dev D1 database
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: bun tools/deploy/ensure-d1-database.ts dev

      - name: Ensure shared dev R2 buckets
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: bun tools/deploy/ensure-r2-buckets.ts dev

      - name: Ensure shared dev Cloudflare Queues
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          bun run deploy:config:dev
          while IFS= read -r queue_name; do
            [ -n "$queue_name" ] || continue
            if bunx wrangler queues info "$queue_name" --config .wrangler/generated/dev.jsonc >/dev/null 2>&1; then
              echo "Queue ${queue_name} already exists."
            else
              bunx wrangler queues create "$queue_name" --config .wrangler/generated/dev.jsonc
            fi
          done < <(jq -r '.queues.producers[].queue' .wrangler/generated/dev.jsonc)

      - name: Reconcile shared dev Luma webhook
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' && env.NUXT_LUMA_API_KEY != '' }}
        run: |
          set -euo pipefail
          if output="$(bun tools/luma/webhook-bootstrap.ts apply --secret-bulk-path .wrangler-dev-luma-webhook-secret.json 2>&1)"; then
            printf '%s\n' "$output"
            exit 0
          fi

          printf '%s\n' "$output"
          if grep -Fq 'active Luma Plus plan' <<< "$output"; then
            echo "::warning::Skipping dev Luma webhook reconciliation because this Luma calendar cannot use API requests without an active Luma Plus plan."
            exit 0
          fi

          exit 1

      - name: Upload shared dev Worker secrets
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: |
          jq -n \
            --arg auth0ClientId "$NUXT_AUTH0_CLIENT_ID" \
            --arg auth0ClientSecret "$NUXT_AUTH0_CLIENT_SECRET" \
            --arg auth0SessionSecret "$NUXT_AUTH0_SESSION_SECRET" \
            --arg auth0Audience "$NUXT_AUTH0_AUDIENCE" \
            --arg accountLinkChallengeSecret "$NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET" \
            --arg lumaApiKey "$NUXT_LUMA_API_KEY" \
            '{
              NUXT_AUTH0_CLIENT_ID: $auth0ClientId,
              NUXT_AUTH0_CLIENT_SECRET: $auth0ClientSecret,
              NUXT_AUTH0_SESSION_SECRET: $auth0SessionSecret,
              NUXT_AUTH0_AUDIENCE: $auth0Audience,
              NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: $accountLinkChallengeSecret,
              NUXT_LUMA_API_KEY: $lumaApiKey
            }' > .wrangler-dev-secrets.json
          if [ -f .wrangler-dev-luma-webhook-secret.json ]; then
            jq -s '.[0] * .[1]' \
              .wrangler-dev-secrets.json \
              .wrangler-dev-luma-webhook-secret.json > .wrangler-dev-secrets.merged.json
            mv .wrangler-dev-secrets.merged.json .wrangler-dev-secrets.json
          fi
          bunx wrangler secret bulk .wrangler-dev-secrets.json --config .wrangler/generated/dev.jsonc
          rm -f .wrangler-dev-secrets.json .wrangler-dev-luma-webhook-secret.json

      - name: Apply shared dev Auth0 configuration
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: bun tools/auth0/auth0-bootstrap.ts apply

      - name: Apply shared dev D1 migrations
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: bun run db:migrate:dev

      - name: Deploy shared dev Worker
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: bun run deploy:worker:dev

      - name: Reconcile shared dev Queue consumers
        if: ${{ steps.dev_deploy_config.outputs.enabled == 'true' }}
        run: bun run deploy:queue-consumers:dev

  auth0-bdd-suite:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    needs: backend-checks
    runs-on: ubuntu-latest
    environment:
      name: bdd
    env:
      CI: true
      NUXT_AUTH0_DOMAIN: ${{ secrets.NUXT_AUTH0_DOMAIN }}
      NUXT_AUTH0_CLIENT_ID: ${{ secrets.NUXT_AUTH0_CLIENT_ID }}
      NUXT_AUTH0_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_CLIENT_SECRET }}
      NUXT_AUTH0_SESSION_SECRET: ${{ secrets.NUXT_AUTH0_SESSION_SECRET }}
      NUXT_AUTH0_APP_BASE_URL: http://localhost:3000
      NUXT_AUTH0_AUDIENCE: ${{ secrets.NUXT_AUTH0_AUDIENCE }}
      NUXT_AUTH0_DATABASE_CONNECTION_NAME: ${{ vars.NUXT_AUTH0_DATABASE_CONNECTION_NAME }}
      NUXT_DATABASE_BINDING: DB
      AUTH0_MANAGEMENT_DOMAIN: ${{ vars.AUTH0_MANAGEMENT_DOMAIN }}
      AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
      E2E_PLATFORM_ADMIN_EMAIL: ${{ secrets.E2E_PLATFORM_ADMIN_EMAIL }}
      E2E_PLATFORM_ADMIN_PASSWORD: ${{ secrets.E2E_PLATFORM_ADMIN_PASSWORD }}
      E2E_EVENT_ADMIN_EMAIL: ${{ secrets.E2E_EVENT_ADMIN_EMAIL }}
      E2E_EVENT_ADMIN_PASSWORD: ${{ secrets.E2E_EVENT_ADMIN_PASSWORD }}
      E2E_JUDGE_EMAIL: ${{ secrets.E2E_JUDGE_EMAIL }}
      E2E_JUDGE_PASSWORD: ${{ secrets.E2E_JUDGE_PASSWORD }}
      E2E_REGULAR_USER_EMAIL: ${{ secrets.E2E_REGULAR_USER_EMAIL }}
      E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}

    steps:
      - name: Check Auth0-backed BDD configuration
        id: auth0_bdd_config
        run: |
          set -euo pipefail
          missing=()
          for name in \
            NUXT_AUTH0_DOMAIN \
            NUXT_AUTH0_CLIENT_ID \
            NUXT_AUTH0_CLIENT_SECRET \
            NUXT_AUTH0_SESSION_SECRET \
            NUXT_AUTH0_DATABASE_CONNECTION_NAME \
            AUTH0_MANAGEMENT_DOMAIN \
            AUTH0_MGMT_CLIENT_ID \
            AUTH0_MGMT_CLIENT_SECRET \
            E2E_PLATFORM_ADMIN_EMAIL \
            E2E_PLATFORM_ADMIN_PASSWORD \
            E2E_EVENT_ADMIN_EMAIL \
            E2E_EVENT_ADMIN_PASSWORD \
            E2E_JUDGE_EMAIL \
            E2E_JUDGE_PASSWORD \
            E2E_REGULAR_USER_EMAIL \
            E2E_REGULAR_USER_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'enabled=false\n' >> "$GITHUB_OUTPUT"
            printf '::notice::Auth0-backed BDD suite skipped because required environment values are missing: %s.\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 0
          fi

          printf 'enabled=true\n' >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        uses: actions/checkout@v6.0.2

      - name: Install bun
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        run: bun ci

      - name: Cache Playwright Chromium
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        uses: actions/cache@v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        run: bunx playwright install --with-deps chromium

      - name: Auth0-backed BDD suite
        if: ${{ steps.auth0_bdd_config.outputs.enabled == 'true' }}
        run: bun run test:bdd
