name: release-production

on:
  release:
    types:
      - published

jobs:
  release-production:
    runs-on: ubuntu-latest
    concurrency:
      group: release-production
      cancel-in-progress: false
    permissions:
      contents: write
    environment:
      name: production
      url: https://${{ vars.DEPLOY_PRODUCTION_BASE_DOMAIN }}
    env:
      CI: true
      NODE_OPTIONS: --max-old-space-size=4096
      # Deployment hostnames.
      DEPLOY_PRODUCTION_BASE_DOMAIN: ${{ vars.DEPLOY_PRODUCTION_BASE_DOMAIN }}
      # Cloudflare resource metadata.
      DEPLOY_CF_ZONE_NAME: ${{ vars.DEPLOY_CF_ZONE_NAME }}
      DEPLOY_CF_WORKER_NAME: ${{ vars.DEPLOY_CF_WORKER_NAME }}
      DEPLOY_CF_D1_DATABASE_NAME: ${{ vars.DEPLOY_CF_D1_DATABASE_NAME }}
      DEPLOY_CF_D1_DATABASE_ID: ${{ vars.DEPLOY_CF_D1_DATABASE_ID }}
      DEPLOY_CF_PROFILE_ICONS_BUCKET: ${{ vars.DEPLOY_CF_PROFILE_ICONS_BUCKET }}
      DEPLOY_CF_EVENT_IMAGES_BUCKET: ${{ vars.DEPLOY_CF_EVENT_IMAGES_BUCKET }}
      DEPLOY_CF_APPLICATION_REVIEW_EMAIL_QUEUE: ${{ vars.DEPLOY_CF_APPLICATION_REVIEW_EMAIL_QUEUE }}
      DEPLOY_CF_EVENT_OUTCOME_EMAIL_QUEUE: ${{ vars.DEPLOY_CF_EVENT_OUTCOME_EMAIL_QUEUE }}
      DEPLOY_CF_LUMA_SYNC_QUEUE: ${{ vars.DEPLOY_CF_LUMA_SYNC_QUEUE }}
      # Deployment URL overrides.
      DEPLOY_AUTH0_CUSTOM_DOMAIN: ${{ vars.DEPLOY_AUTH0_CUSTOM_DOMAIN }}
      DEPLOY_EVENT_IMAGES_PUBLIC_CDN_BASE_URL: ${{ vars.DEPLOY_EVENT_IMAGES_PUBLIC_CDN_BASE_URL }}
      DEPLOY_LUMA_WEBHOOK_URL: ${{ vars.DEPLOY_LUMA_WEBHOOK_URL }}
      LUMA_WEBHOOK_URL: ${{ vars.DEPLOY_LUMA_WEBHOOK_URL }}
      # Auth0 bootstrap settings.
      AUTH0_MANAGEMENT_DOMAIN: ${{ vars.AUTH0_MANAGEMENT_DOMAIN }}
      AUTH0_APP_BASE_URL: https://${{ vars.DEPLOY_PRODUCTION_BASE_DOMAIN }}
      AUTH0_CUSTOM_DOMAIN: ${{ vars.DEPLOY_AUTH0_CUSTOM_DOMAIN }}
      AUTH0_LOGIN_URI: https://${{ vars.DEPLOY_PRODUCTION_BASE_DOMAIN }}/auth/login
      AUTH0_APP_DISPLAY_NAME: ${{ vars.AUTH0_APP_DISPLAY_NAME || 'Codex Events' }}
      AUTH0_DATABASE_CONNECTION_NAME: ${{ vars.NUXT_AUTH0_DATABASE_CONNECTION_NAME }}
      AUTH0_APP_CLIENT_ID: ${{ secrets.AUTH0_APP_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
      AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
      AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: ${{ secrets.NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET }}
      # Auth0 runtime settings.
      NUXT_AUTH0_DOMAIN: ${{ vars.DEPLOY_AUTH0_CUSTOM_DOMAIN }}
      NUXT_AUTH0_APP_BASE_URL: https://${{ vars.DEPLOY_PRODUCTION_BASE_DOMAIN }}
      NUXT_AUTH0_DATABASE_CONNECTION_NAME: ${{ vars.NUXT_AUTH0_DATABASE_CONNECTION_NAME }}
      # Cloudflare Email Service and Queues runtime settings.
      NUXT_OUTBOUND_EMAIL_BINDING: ${{ vars.NUXT_OUTBOUND_EMAIL_BINDING }}
      NUXT_OUTBOUND_EMAIL_FROM_EMAIL: ${{ vars.NUXT_OUTBOUND_EMAIL_FROM_EMAIL }}
      NUXT_OUTBOUND_EMAIL_FROM_NAME: ${{ vars.NUXT_OUTBOUND_EMAIL_FROM_NAME }}
      NUXT_OUTBOUND_EMAIL_REPLY_TO: ${{ vars.NUXT_OUTBOUND_EMAIL_REPLY_TO }}
      NUXT_APPLICATION_REVIEW_EMAILS_QUEUE_BINDING: ${{ vars.NUXT_APPLICATION_REVIEW_EMAILS_QUEUE_BINDING }}
      NUXT_APPLICATION_REVIEW_EMAILS_RETRY_DELAY_SECONDS: ${{ vars.NUXT_APPLICATION_REVIEW_EMAILS_RETRY_DELAY_SECONDS }}
      NUXT_EVENT_OUTCOME_EMAILS_QUEUE_BINDING: ${{ vars.NUXT_EVENT_OUTCOME_EMAILS_QUEUE_BINDING }}
      NUXT_EVENT_OUTCOME_EMAILS_RETRY_DELAY_SECONDS: ${{ vars.NUXT_EVENT_OUTCOME_EMAILS_RETRY_DELAY_SECONDS }}
      NUXT_LUMA_QUEUE_BINDING: ${{ vars.NUXT_LUMA_QUEUE_BINDING }}
      NUXT_LUMA_RETRY_DELAY_SECONDS: ${{ vars.NUXT_LUMA_RETRY_DELAY_SECONDS }}
      # Worker secrets.
      NUXT_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_APP_CLIENT_ID }}
      NUXT_AUTH0_CLIENT_SECRET: ${{ secrets.NUXT_AUTH0_CLIENT_SECRET }}
      NUXT_AUTH0_SESSION_SECRET: ${{ secrets.NUXT_AUTH0_SESSION_SECRET }}
      NUXT_AUTH0_AUDIENCE: ${{ secrets.NUXT_AUTH0_AUDIENCE }}
      NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: ${{ secrets.NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET }}
      NUXT_LUMA_API_KEY: ${{ secrets.NUXT_LUMA_API_KEY }}
      # Cloudflare credentials.
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache Bun install cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Install dependencies
        run: bun ci

      - name: Derive release version
        id: release_version
        run: |
          release_tag='${{ github.event.release.tag_name }}'
          release_version="$(bun run release:version "$release_tag")"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Sync package.json to release version
        run: bun run release:version "${{ steps.release_version.outputs.release_tag }}" --write

      - name: Ensure production Auth0 custom domain and verification DNS
        env:
          AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_MGMT_CLIENT_ID }}
          AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_MGMT_CLIENT_SECRET }}
        run: bun run auth0:custom-domain

      - name: Ensure production Cloudflare Queues
        run: |
          set -euo pipefail
          bun run deploy:config:production
          while IFS= read -r queue_name; do
            [ -n "$queue_name" ] || continue
            if bunx wrangler queues info "$queue_name" --config .wrangler/generated/production.jsonc >/dev/null 2>&1; then
              echo "Queue ${queue_name} already exists."
            else
              bunx wrangler queues create "$queue_name" --config .wrangler/generated/production.jsonc
            fi
          done < <(jq -r '.queues.producers[].queue' .wrangler/generated/production.jsonc)

      - name: Reconcile production Luma webhook
        if: ${{ env.NUXT_LUMA_API_KEY != '' }}
        run: bun tools/luma/webhook-bootstrap.ts apply --secret-bulk-path .wrangler-production-luma-webhook-secret.json

      - name: Upload production Worker secrets
        run: |
          jq -n \
            --arg auth0ClientId "$NUXT_AUTH0_CLIENT_ID" \
            --arg auth0ClientSecret "$NUXT_AUTH0_CLIENT_SECRET" \
            --arg auth0SessionSecret "$NUXT_AUTH0_SESSION_SECRET" \
            --arg auth0Audience "$NUXT_AUTH0_AUDIENCE" \
            --arg accountLinkChallengeSecret "$NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET" \
            --arg lumaApiKey "$NUXT_LUMA_API_KEY" \
            '{
              NUXT_AUTH0_CLIENT_ID: $auth0ClientId,
              NUXT_AUTH0_CLIENT_SECRET: $auth0ClientSecret,
              NUXT_AUTH0_SESSION_SECRET: $auth0SessionSecret,
              NUXT_AUTH0_AUDIENCE: $auth0Audience,
              NUXT_AUTH0_ACCOUNT_LINK_CHALLENGE_SECRET: $accountLinkChallengeSecret,
              NUXT_LUMA_API_KEY: $lumaApiKey
            }' > .wrangler-production-secrets.json
          if [ -f .wrangler-production-luma-webhook-secret.json ]; then
            jq -s '.[0] * .[1]' \
              .wrangler-production-secrets.json \
              .wrangler-production-luma-webhook-secret.json > .wrangler-production-secrets.merged.json
            mv .wrangler-production-secrets.merged.json .wrangler-production-secrets.json
          fi
          bunx wrangler secret bulk .wrangler-production-secrets.json --config .wrangler/generated/production.jsonc
          rm -f .wrangler-production-secrets.json .wrangler-production-luma-webhook-secret.json

      - name: Apply production Auth0 configuration
        run: bun tools/auth0/auth0-bootstrap.ts apply

      - name: Apply production D1 migrations
        run: bun run db:migrate:production

      - name: Deploy production Worker
        run: bun run deploy:production

      - name: Commit package version back to main
        env:
          RELEASE_TAG: ${{ steps.release_version.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git restore --source=HEAD --staged --worktree package.json
          git checkout main
          git pull --ff-only origin main
          bun run release:version "$RELEASE_TAG" --write

          if git diff --quiet -- package.json; then
            echo "package.json already matches ${RELEASE_VERSION}."
            exit 0
          fi

          git add package.json
          git commit --cleanup=verbatim -m "chore(release): sync package version to ${RELEASE_VERSION} [skip ci]"
          git push origin HEAD:main
